<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Super Snake Adventure! 🐍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&amp;family=Comic+Neue:wght@400;700&amp;display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            font-family: 'Fredoka', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #333;
        }
        
        .container {
            text-align: center;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            padding: 20px 30px 30px;
            max-width: 520px;
            width: 100%;
        }
        
        h1 {
            font-family: 'Comic Neue', cursive;
            font-size: 42px;
            margin: 10px 0 5px;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f0f8ff;
            border-radius: 20px;
            padding: 12px 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            font-size: 18px;
        }
        
        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .stat-label {
            font-size: 13px;
            color: #666;
            font-weight: 600;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #333;
        }
        
        #lives {
            font-size: 28px;
            letter-spacing: 4px;
        }
        
        canvas {
            border: 8px solid #4ecdc4;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
            background: #f8fff8;
            image-rendering: pixelated;
        }
        
        .controls {
            margin-top: 20px;
            font-size: 15px;
            color: #555;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 6px 15px rgba(255, 107, 107, 0.4);
            transition: all 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.5);
        }
        
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            border-radius: 30px;
            z-index: 100;
        }
        
        #overlay h2 {
            font-size: 48px;
            margin: 0 0 10px;
            text-shadow: 0 5px 10px rgba(0, 0, 0, 0.5);
        }
        
        #flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 80, 80, 0.6);
            pointer-events: none;
            opacity: 0;
            border-radius: 20px;
            z-index: 50;
            transition: opacity 0.3s;
        }
        
        .emoji {
            font-size: 28px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Super Snake! 🐍</h1>
        <div class="subtitle">Collect yummy treats! ❤️</div>
        
        <div class="dashboard">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">HIGH</div>
                <div class="stat-value" id="highscore">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">LEVEL</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">LIVES</div>
                <div id="lives">❤️❤️❤️</div>
            </div>
        </div>
        
        <canvas id="canvas" width="440" height="440"></canvas>
        
        <div class="controls">
            <div>↑ W &nbsp; ↓ S &nbsp; ← A &nbsp; → D</div>
        </div>
        
        <button class="btn" onclick="restartGame()">Play Again</button>
        
        <!-- Overlay -->
        <div id="overlay">
            <div id="overlay-content">
                <h2 id="overlay-title"></h2>
                <p id="overlay-subtitle" style="font-size:22px; margin:10px 0 30px;"></p>
                <button class="btn" onclick="restartGame()">Play Again</button>
            </div>
        </div>
        
        <!-- Flash overlay -->
        <div id="flash"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highscoreEl = document.getElementById('highscore');
        const levelEl = document.getElementById('level');
        const livesEl = document.getElementById('lives');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlaySubtitle = document.getElementById('overlay-subtitle');
        const flashEl = document.getElementById('flash');
        
        const GRID_SIZE = 20;
        const CELL_SIZE = 22;
        const CANVAS_SIZE = GRID_SIZE * CELL_SIZE;
        canvas.width = CANVAS_SIZE;
        canvas.height = CANVAS_SIZE;
        
        let snake = [
            {x: 10, y: 10},
            {x: 9, y: 10},
            {x: 8, y: 10}
        ];
        let dx = 1;
        let dy = 0;
        let food = {x: 15, y: 10};
        let foodEmoji = '🍎';
        let score = 0;
        let highScore = localStorage.getItem('superSnakeHigh') ? parseInt(localStorage.getItem('superSnakeHigh')) : 0;
        let level = 1;
        let lives = 3;
        let gameSpeed = 160;
        let lastUpdateTime = 0;
        let gameRunning = true;
        let isInvincible = false;
        let invincibleEndTime = 0;
        let totalEaten = 0;
        let directionQueue = [];
        
        const foodOptions = ['🍎', '🍌', '🍓', '🍇', '🍕', '🍩', '🍒', '🥝'];
        
        let particles = [];
        
        // Audio Context
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playEatSound() {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            
            oscillator.connect(gain);
            gain.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.15);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
            
            setTimeout(() => {
                oscillator.stop();
            }, 300);
        }
        
        function playCrashSound() {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(180, audioCtx.currentTime);
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(600, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            
            oscillator.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            oscillator.start();
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
            oscillator.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.7);
            
            setTimeout(() => {
                oscillator.stop();
            }, 800);
        }
        
        function playVictorySound() {
            initAudio();
            let time = audioCtx.currentTime;
            const notes = [523.25, 659.25, 783.99, 1046.5];
            
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, time + i * 0.1);
                gain.gain.setValueAtTime(0.3, time + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, time + i * 0.1 + 0.6);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(time + i * 0.1);
                osc.stop(time + i * 0.1 + 0.8);
            });
        }
        
        function createConfetti() {
            particles = [];
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeead', '#ffcc5c'];
            
            for (let i = 0; i < 180; i++) {
                particles.push({
                    x: Math.random() * CANVAS_SIZE,
                    y: Math.random() * CANVAS_SIZE * 0.6,
                    vx: (Math.random() - 0.5) * 7,
                    vy: Math.random() * 5 + 2,
                    size: Math.random() * 12 + 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 12,
                    life: 220
                });
            }
        }
        
        function updateStats() {
            scoreEl.textContent = score;
            highscoreEl.textContent = highScore;
            levelEl.textContent = level;
            
            let hearts = '';
            for (let i = 0; i < lives; i++) {
                hearts += '❤️';
            }
            livesEl.innerHTML = hearts || '💔';
        }
        
        function randomFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            
            food = newFood;
            foodEmoji = foodOptions[Math.floor(Math.random() * foodOptions.length)];
        }
        
        function drawBackground() {
            ctx.fillStyle = '#f0fff0';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            
            // Light grid
            ctx.strokeStyle = '#e0ffe0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, CANVAS_SIZE);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(CANVAS_SIZE, i * CELL_SIZE);
                ctx.stroke();
            }
        }
        
        function drawSnake() {
            for (let i = 0; i < snake.length; i++) {
                const segment = snake[i];
                const x = segment.x * CELL_SIZE + CELL_SIZE / 2;
                const y = segment.y * CELL_SIZE + CELL_SIZE / 2;
                
                ctx.save();
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = 'bold 22px Arial';
                
                if (i === 0) {
                    // Head
                    ctx.font = '28px Arial';
                    ctx.fillText('🐍', x, y + 2);
                } else {
                    // Body
                    ctx.fillStyle = '#22c55e';
                    ctx.fillText('🟢', x, y);
                }
                ctx.restore();
            }
        }
        
        function drawFood() {
            const x = food.x * CELL_SIZE + CELL_SIZE / 2;
            const y = food.y * CELL_SIZE + CELL_SIZE / 2;
            
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = '28px Arial';
            ctx.fillText(foodEmoji, x, y);
            ctx.restore();
        }
        
        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 220;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 1.6);
                ctx.restore();
                
                // Update
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.18; // gravity
                p.rotation += p.rotSpeed;
                p.life--;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }
        
        function draw() {
            drawBackground();
            drawSnake();
            drawFood();
            drawParticles();
        }
        
        function moveSnake() {
            // Process queued direction
            if (directionQueue.length > 0) {
                const nextDir = directionQueue.shift();
                // Only change if not opposite
                if (!(nextDir.x === -dx && nextDir.y === -dy)) {
                    dx = nextDir.x;
                    dy = nextDir.y;
                }
            }
            
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Check wall collision
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                handleCollision();
                return false;
            }
            
            // Check self collision
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    handleCollision();
                    return false;
                }
            }
            
            snake.unshift(head);
            
            // Check if ate food
            if (head.x === food.x && head.y === food.y) {
                score += 10 + level * 5;
                totalEaten++;
                playEatSound();
                randomFood();
                
                if (totalEaten % 5 === 0 && level < 5) {
                    level++;
                    gameSpeed = Math.max(60, gameSpeed - 22);
                    updateStats();
                }
                
                if (totalEaten >= 25) {
                    triggerVictory();
                    return true;
                }
                
                updateStats();
            } else {
                snake.pop();
            }
            
            return true;
        }
        
        function handleCollision() {
            if (isInvincible) return;
            
            lives--;
            updateStats();
            playCrashSound();
            flashScreen();
            
            if (lives > 0) {
                isInvincible = true;
                invincibleEndTime = Date.now() + 2200;
                
                // Reset snake position
                snake = [
                    {x: 10, y: 10},
                    {x: 9, y: 10},
                    {x: 8, y: 10}
                ];
                dx = 1;
                dy = 0;
                directionQueue = [];
            } else {
                gameOver();
            }
        }
        
        function flashScreen() {
            flashEl.style.transition = 'none';
            flashEl.style.opacity = '0.65';
            setTimeout(() => {
                flashEl.style.transition = 'opacity 0.6s';
                flashEl.style.opacity = '0';
            }, 20);
        }
        
        function checkInvincibility() {
            if (isInvincible && Date.now() > invincibleEndTime) {
                isInvincible = false;
            }
        }
        
        function gameLoop(timestamp) {
            if (!gameRunning) return;
            
            requestAnimationFrame(gameLoop);
            
            if (!timestamp) timestamp = Date.now();
            
            if (timestamp - lastUpdateTime > gameSpeed) {
                checkInvincibility();
                const moved = moveSnake();
                if (moved) {
                    draw();
                }
                lastUpdateTime = timestamp;
            }
        }
        
        function triggerVictory() {
            gameRunning = false;
            playVictorySound();
            createConfetti();
            draw();
            
            overlayTitle.textContent = "🎉 VICTORY! 🎉";
            overlaySubtitle.innerHTML = `You are a Master Snake Trainer!<br>Final Score: <b>${score}</b>`;
            overlay.style.display = 'flex';
        }
        
        function gameOver() {
            gameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('superSnakeHigh', highScore);
            }
            
            overlayTitle.textContent = "💔 Game Over";
            overlaySubtitle.innerHTML = `Nice try!<br>Your score: <b>${score}</b>`;
            overlay.style.display = 'flex';
        }
        
        function changeDirection(newDx, newDy) {
            if (!gameRunning) return;
            
            // Prevent immediate reverse
            if (newDx === -dx && newDy === -dy) {
                return;
            }
            
            directionQueue.push({x: newDx, y: newDy});
            
            // Limit queue size
            if (directionQueue.length > 3) {
                directionQueue.shift();
            }
        }
        
        function handleKey(e) {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    changeDirection(0, -1);
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    changeDirection(0, 1);
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    changeDirection(-1, 0);
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    changeDirection(1, 0);
                    break;
                case ' ':
                case 'p':
                case 'P':
                    // Pause not implemented for simplicity
                    break;
            }
        }
        
        function restartGame() {
            overlay.style.display = 'none';
            
            snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10}
            ];
            dx = 1;
            dy = 0;
            score = 0;
            level = 1;
            lives = 3;
            totalEaten = 0;
            gameSpeed = 160;
            directionQueue = [];
            particles = [];
            
            updateStats();
            randomFood();
            gameRunning = true;
            lastUpdateTime = Date.now();
            
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // Initialize game
        function initGame() {
            highscoreEl.textContent = highScore;
            updateStats();
            randomFood();
            draw();
            
            document.addEventListener('keydown', handleKey);
            
            // Touch swipe support for mobile kids
            let touchStartX = 0;
            let touchStartY = 0;
            
            canvas.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            });
            
            canvas.addEventListener('touchend', e => {
                if (!gameRunning) return;
                const touchEndX = e.changedTouches[0].screenX;
                const touchEndY = e.changedTouches[0].screenY;
                
                const deltaX = touchEndX - touchStartX;
                const deltaY = touchEndY - touchStartY;
                
                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    if (deltaX > 40) changeDirection(1, 0);
                    else if (deltaX < -40) changeDirection(-1, 0);
                } else {
                    if (deltaY > 40) changeDirection(0, 1);
                    else if (deltaY < -40) changeDirection(0, -1);
                }
            });
            
            // Start the game loop
            requestAnimationFrame(gameLoop);
        }
        
        // Auto start
        window.onload = initGame;
    </script>
</body>
</html>
